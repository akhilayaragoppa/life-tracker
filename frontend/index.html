<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Life Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .capture-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        #captureInput {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #captureInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #captureBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #captureBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        #captureBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #clearBtn {
            background: #f5f5f5;
            color: #666;
        }

        #clearBtn:hover {
            background: #e0e0e0;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .recent-captures {
            margin-top: 30px;
        }

        .recent-captures h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .capture-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .capture-item:hover {
            background: white;
            transform: translateX(5px);
        }

        .capture-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .capture-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .capture-type.task {
            background: #e3f2fd;
            color: #1976d2;
        }

        .capture-type.goal {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .capture-category {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        .capture-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .capture-timeline {
            font-size: 12px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            color: white;
            opacity: 0.8;
            padding: 40px;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }

            .capture-card {
                padding: 20px;
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Life Tracker</h1>
            <p>Capture your thoughts, tasks, and goals instantly</p>
        </div>

        <div class="capture-card">
            <div class="input-group">
                <textarea
                    id="captureInput"
                    placeholder="What's on your mind? Just type naturally...

Examples:
• call the dentist sometime this week
• build self confidence
• grocery shopping tomorrow
• fix the leaky faucet by end of week"
                    autofocus
                ></textarea>
            </div>

            <div class="button-group">
                <button id="captureBtn">
                    <span id="btnText">Capture</span>
                </button>
                <button id="clearBtn">Clear</button>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div class="recent-captures">
            <h3>Recent Captures</h3>
            <div id="recentList"></div>
        </div>
    </div>

    <script>
        // Use environment variable or default to localhost for development
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : 'https://life-tracker-backend.onrender.com'; // UPDATE THIS after deploying backend
        const captureInput = document.getElementById('captureInput');
        const captureBtn = document.getElementById('captureBtn');
        const clearBtn = document.getElementById('clearBtn');
        const btnText = document.getElementById('btnText');
        const status = document.getElementById('status');
        const recentList = document.getElementById('recentList');

        // Auto-resize textarea
        captureInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Keyboard shortcuts
        captureInput.addEventListener('keydown', function(e) {
            // Cmd/Ctrl + Enter to submit
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                capture();
            }
        });

        clearBtn.addEventListener('click', () => {
            captureInput.value = '';
            captureInput.style.height = 'auto';
            captureInput.focus();
            hideStatus();
        });

        captureBtn.addEventListener('click', capture);

        async function capture() {
            const text = captureInput.value.trim();

            if (!text) {
                showStatus('Please enter something to capture', 'error');
                return;
            }

            setLoading(true);
            hideStatus();

            try {
                const response = await fetch(`${API_BASE}/capture`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                showStatus('✓ Captured successfully!', 'success');
                captureInput.value = '';
                captureInput.style.height = 'auto';

                loadRecentCaptures();

                setTimeout(() => {
                    captureInput.focus();
                }, 500);

            } catch (error) {
                console.error('Capture error:', error);
                showStatus(`Error: ${error.message}. Make sure the backend server is running.`, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function loadRecentCaptures() {
            try {
                const response = await fetch(`${API_BASE}/inbox?processed=false`);

                if (!response.ok) {
                    throw new Error('Failed to load recent captures');
                }

                const items = await response.json();
                displayRecentCaptures(items);

            } catch (error) {
                console.error('Error loading recent captures:', error);
                recentList.innerHTML = '<div class="empty-state">Unable to load recent captures</div>';
            }
        }

        function displayRecentCaptures(items) {
            if (!items || items.length === 0) {
                recentList.innerHTML = '<div class="empty-state">No captures yet. Start by capturing your first thought!</div>';
                return;
            }

            recentList.innerHTML = items.slice(0, 5).map(item => {
                const c = item.classification;
                return `
                    <div class="capture-item" onclick="viewInboxItem('${item.id}')">
                        <div class="capture-item-header">
                            <span class="capture-type ${c.item_type}">${c.item_type}</span>
                            <span class="capture-category">${c.category}</span>
                        </div>
                        <div class="capture-title">${c.title}</div>
                        <div class="capture-timeline">📅 ${c.timeline.replace('_', ' ')}</div>
                    </div>
                `;
            }).join('');
        }

        function viewInboxItem(id) {
            // Future: open detail modal or navigate to inbox page
            console.log('View item:', id);
        }

        function setLoading(loading) {
            captureBtn.disabled = loading;
            btnText.innerHTML = loading ? '<span class="spinner"></span>' : 'Capture';
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        function hideStatus() {
            status.style.display = 'none';
        }

        // Load recent captures on page load
        loadRecentCaptures();

        // Auto-refresh every 30 seconds
        setInterval(loadRecentCaptures, 30000);
    </script>
</body>
</html>
